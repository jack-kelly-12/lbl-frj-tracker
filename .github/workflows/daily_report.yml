name: Daily Longball Labs Report

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate report
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          SEND_EMAIL: ${{ secrets.SEND_EMAIL || 'true' }}

          DATA_DIR: "./data"
          OUTPUT_DIR: "./output"
          LOGO_PATH: "./longball-labs.png"
        run: |
          mkdir -p data output
          uv run python frj_bot.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-lbl-report
          path: ./output/daily_lbl_report.pdf
          retention-days: 7

      - name: Keep workflow active
        run: |
          sed -i "s/^Updated: .*/Updated: $(date -u '+%Y-%m-%d')/" README.md || echo "Updated: $(date -u '+%Y-%m-%d')" >> README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: keep workflow active [skip ci]"
          git push
